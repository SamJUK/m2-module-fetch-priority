name: Bug Report
description: Report a problem with the module
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you expect instead?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true

  - type: input
    id: module-version
    attributes:
      label: Module version
      placeholder: e.g. 0.0.5
    validations:
      required: true

  - type: input
    id: magento-version
    attributes:
      label: Magento version
      placeholder: e.g. 2.4.7-p3
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: e.g. 8.1
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / error output
      render: shell
    validations:
      required: false
